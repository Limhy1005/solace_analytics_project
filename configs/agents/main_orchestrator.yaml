  # Solace Agent Mesh Orchestrator Agent Configurations

  log:
    stdout_log_level: INFO
    log_file_level: INFO
    log_file: orchestrator-agent.log

  # Shared SAM config
  !include ../shared_config.yaml

  apps:
    - name: orchestrator-agent_app
      app_base_path: .
      app_module: solace_agent_mesh.agent.sac.app
      broker:
        <<: *broker_connection

      app_config:
        namespace: ${NAMESPACE} 
        supports_streaming: true
        agent_name: "OrchestratorAgent"
        display_name: "OrchestratorAgent"
        model: *planning_model

        instruction: |
          You are the Orchestrator Agent within an AI agentic system. Your primary responsibilities are to:
          1. Process tasks received from external sources via the system Gateway.
          2. Analyze each task to determine the optimal execution strategy:
            a. Single Agent Delegation: If the task can be fully addressed by a single peer agent (based on their declared capabilities/description), delegate the task to that agent.
            b. Multi-Agent Coordination: If task completion requires a coordinated effort from multiple peer agents: first, devise a logical execution plan (detailing the sequence of agent invocations and any necessary data handoffs). Then, manage the execution of this plan, invoking each agent in the defined order.
            c. Direct Execution: If the task is not suitable for delegation (neither to a single agent nor a multi-agent sequence) and falls within your own capabilities, execute the task yourself.
          
          <human_in_the_loop_protocol>
          UNIVERSAL APPROVAL WORKFLOW:
          You are completely agnostic to the specific content being generated. If ANY agent's routing directive requires user approval before proceeding to downstream tasks, you MUST execute this exact loop:

          1. PRESENT & PAUSE: 
             Present the generated output seamlessly as if it is from the unified system. 
             - PROHIBITED: NEVER mention the internal agent's name (e.g., do NOT say "The PlannerAgent provided...").
             - INTRO: Generate a dynamic, context-aware opening sentence (maximum 1 short sentence). Tailor it to the user's specific request rather than using a generic phrase. (e.g., "I've outlined a strategy to analyze your online sales data:" or "Here is the blueprint for the customer retention query:"). Alternatively, output the content directly with no intro if it flows better.
             - BODY: Display the exact generated content.
             - OUTRO: You MUST append a professional approval question at the very bottom. Generate a natural closing question asking for approval or changes (e.g., "Does this approach align with your expectations, or should we adjust the metrics?", "Would you like me to proceed with this plan?").
             IMMEDIATELY STOP further execution. Do not invoke downstream agents.

          2. EVALUATE USER FEEDBACK:
             Wait for the user's response.
             - IF USER APPROVES: 
                 Proceed to the next logical agent in your multi-agent workflow, passing the exact approved content as the input payload.
             - IF USER MODIFIES:
                 Assess the impact of the modification:
                 * Minor Tweak (Formatting, simple value swaps, basic filtering): Apply the update yourself to the context and proceed to the next agent.
                 * Major Rewrite (Core logic changes, structural changes, adding/removing major components): You MUST send the feedback back to the specific agent that generated the content, instructing it to regenerate the output. Do NOT proceed downstream until the user approves the regenerated output.
          </human_in_the_loop_protocol>

        inject_system_purpose: false # change back to true
        inject_response_format: false # change back to true 
        inject_user_profile: false # change back to true
        session_service: 
          type: "sql"
          database_url: "${ORCHESTRATOR_DATABASE_URL, sqlite:///orchestrator.db}"
          default_behavior: "PERSISTENT"
        artifact_service: *default_artifact_service
        artifact_handling_mode: "embed" 
        enable_embed_resolution: true
        enable_artifact_content_instruction: true 
        data_tools_config: *default_data_tools_config
        tools: 

        agent_card:
          description: "The Orchestrator component. It manages tasks and coordinates multi-agent workflows."
          defaultInputModes: [text]
          defaultOutputModes: [text, file]
          skills:
          - id: strategic_planning
            name: Strategic Planning
            description: Analyzes complex requests and creates structured execution plans, breaking down multi-step goals into logical sequences with clear checkpoints and progress tracking.

          - id: agent_coordination
            name: Agent Coordination
            description: Identifies the most suitable specialized agents for specific tasks and coordinates multi-agent workflows, managing data handoffs and execution sequences to achieve complex objectives efficiently.

          - id: artifact_management
            name: Artifact Management
            description: Creates, transforms, and manages various artifact types including documents, reports, and data files, with capabilities for content generation, formatting, embedding dynamic data, and applying sophisticated data transformations.

        agent_card_publishing: 
          interval_seconds: 10
        agent_discovery: 
          enabled: true
        inter_agent_communication:
          allow_list: ["*"]

          request_timeout_seconds: 600


          # [STRICT DATA PASSING RULES]
          # 1. Check the 'Tool Results' carefully. 
          # 2. IF the previous agent returned data as TEXT/TABLE (not a file): 
          #    - You MUST copy and paste that EXACT text/table into the 'task_description' for the next agent.
          #    - DO NOT put anything in the 'artifacts' list.
          # 3. IF the previous agent explicitly saved a FILE (Artifact):
          #    - You can then put the filename in the 'artifacts' list.
          # 4. NEVER invent or guess filenames like if they were not explicitly created.


# Artifact Management Guidelines:
#           - You must review your artifacts and return the ones that are important for the user by using artifact_return embed. You can use list_artifacts to see all available artifacts.
#           - Provide regular progress updates using `status_update` embed directives, especially before initiating any tool call.
