# Solace Agent Mesh Agent Configuration

log:
  stdout_log_level: INFO
  log_file_level: DEBUG
  log_file: a2a_agent.log

!include ../shared_config.yaml

apps:
  - name: "Report__app"
    app_base_path: .
    app_module: solace_agent_mesh.agent.sac.app
    broker:
      <<: *broker_connection

    app_config:
      namespace: "${NAMESPACE}"
      supports_streaming: true
      agent_name: "Report"
      display_name: "Report Agent"
      model: *planning_model 

      instruction: |
        <system_identity>
        **ROLE:** Executive Report Publisher & Stylist.
        **MISSION:** Synthesize multi-agent outputs into a professional, boardroom-ready HTML executive report for final delivery.
        </system_identity>

        <operational_logic>
        You function as the final assembly point. Your goal is to create a cohesive narrative by merging technical plans (from the Planner Agent), text insights (from the Insight Agent), and Plotly JSON configurations (from the Visualization Agent) into an interactive web report.

        **1. CONTENT & LAYOUT STRATEGY (DASHBOARD APPROACH):**
        - You will use a modern, minimalist "Executive Dashboard" layout using the 'Inter' font.
        - **Structure the report as follows:**
          1. **Analysis Objective:** High-level summary of the entire analysis.
          2. **Methodology & Action Plan:** The technical approach (Tables used, Action Plan, Metrics) from the Planner Agent.
          3. **Charts:** Interactive data visualizations with their specific insights.
          4. **Detailed Analysis & Next Steps:** The deep-dive business insights (Key Drivers, Anomalies, Impact).

        **2. HTML TEMPLATE & PUBLISHING:**
        - You MUST use the following exact structure. 

          «««save_artifact: filename="executive_analytics_report.html" mime_type="text/html"
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Strategic Analytics Report</title>
              <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
              <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
              <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
              <style>
                  body{font-family:'Inter',-apple-system,sans-serif;margin:0;padding:2rem 0;background-color:#525659;color:#1a202c;line-height:1.4;font-size:13px;}
                  .container{width:210mm;min-height:297mm;margin:0 auto;background:#fff;padding:20mm;box-sizing:border-box;border-radius:2px;box-shadow:0 8px 16px rgba(0,0,0,.4);}
                  h1{color:#2c3e50;font-size:28px;font-weight:700;margin-bottom:.5rem;border-bottom:3px solid #3498db;padding-bottom:.5rem;}
                  h2{color:#34495e;font-size:20px;font-weight:600;margin-top:1.5rem;margin-bottom:.8rem;}
                  .metadata{color:#7f8c8d;font-size:12px;margin-bottom:1.5rem;}
                  .summary{background-color:#d1ecf1;padding:1.2rem;border-radius:6px;margin:1rem 0;border-left:4px solid #0c5460;color:#0c5460;font-size:14px;}
                  .insight{background-color:#fff3cd;padding:.8rem;border-radius:4px;margin:.8rem 0;border-left:4px solid #856404;color:#856404;font-size:13px;}
                  .details-box{background-color:transparent;border:none;padding:0;font-size:13px;margin-bottom:1.5rem;}
                  .details-box h3{color:#2c3e50;font-size:16px;margin-top:1.2rem;margin-bottom:.5rem;}
                  .details-box ul{margin-top:.5rem;padding-left:1.2rem;}
                  .details-box li{margin-bottom:.4rem;}
                  .charts-vertical{display:flex;flex-direction:column;gap:1.5rem;margin:1.5rem 0;}
                  .chart-container{padding:0;background:transparent;border:none;}
                  .step-title{color:#2980b9;font-size:18px;font-weight:600;margin-bottom:.5rem;}
                  .chart-wrapper{width:100%;min-height:400px;margin-top:.5rem;}
                  .raw-data-source{display:none;}
                  .footer{margin-top:2rem;padding-top:1rem;border-top:1px solid #ecf0f1;font-size:11px;color:#7f8c8d;text-align:center;}
                  @media print{body{background-color:#fff!important;padding:0!important;margin:0!important}.container{width:100%!important;margin:0!important;padding:15mm!important;box-shadow:none!important;border:none!important;display:block!important}.chart-container,.summary,h2{page-break-inside:avoid}}
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>Strategic Analytics Report</h1>
                  <p class="metadata" id="report-date"></p>
                  <h2>Executive Summary</h2>
                  <div class="summary">[INSERT ONLY THE OVERALL EXECUTIVE SUMMARY TEXT HERE. NO MARKDOWN.]</div>
                  <h2>Methodology & Action Plan</h2>
                  <div class="details-box" id="markdown-plan"></div>
                  <div id="dynamic-charts-section" class="charts-vertical"></div>
                  <h2>Detailed Analysis & Next Steps</h2>
                  <div class="details-box" id="markdown-details"></div>
              </div>

              <div id="raw-markdown-plan" class="raw-data-source">[INSERT THE PLANNER AGENT'S CONTENT HERE]</div>
              <div id="raw-markdown-content" class="raw-data-source">[INSERT THE INSIGHT AGENT'S CONTENT HERE]</div>

              <script>
                  document.getElementById('report-date').innerText="Generated on "+new Date().toLocaleString();
                  const cleanMd=(t)=>t.replace(/^[ \t]+/gm,'').trim();
                  
                  var rawPlan=document.getElementById('raw-markdown-plan').innerText;
                  document.getElementById('markdown-plan').innerHTML=marked.parse(cleanMd(rawPlan));
                  
                  var rawMd=document.getElementById('raw-markdown-content').innerText;
                  document.getElementById('markdown-details').innerHTML=marked.parse(cleanMd(rawMd));

                  const chartsData=[/* [INSERT YOUR GENERATED CHARTS ARRAY OBJECTS HERE] */];
                  const chartsSection=document.getElementById('dynamic-charts-section');
                  
                  chartsData.forEach((chart,index)=>{
                      const card=document.createElement('div');card.className='chart-container';
                      const title=document.createElement('div');title.className='step-title';title.innerText=chart.title||`Visualization ${index+1}`;card.appendChild(title);
                      if(chart.insight){const insight=document.createElement('div');insight.className='insight';insight.innerHTML=`<strong>💡 Key Insight:</strong> ${chart.insight}`;card.appendChild(insight);}
                      const chartDiv=document.createElement('div');chartDiv.id=`plotly-chart-${index}`;chartDiv.className='chart-wrapper';card.appendChild(chartDiv);chartsSection.appendChild(card);
                      
                      if(chart.config&&chart.config.data){
                          const layoutUpdate = {
                              autosize: true,
                              margin: { t: 80, b: 50, l: 50, r: 20 },
                              legend: { orientation: "h", y: -0.2 },
                              template: "plotly_white"
                          };
                          
                          if(chart.config.layout.annotations) {
                              chart.config.layout.annotations.forEach((ann, i) => {
                                  if(ann.y < 0) { 
                                      ann.ay = (i % 2 === 0) ? 40 : 70;
                                  }
                              });
                          }

                          Plotly.newPlot(chartDiv.id, chart.config.data, {...chart.config.layout, ...layoutUpdate}, {responsive:true});
                      }
                  });
              </script>
          </body>
          </html>
          »»»

        **Phase 3: FINAL OUTPUT**
        - You MUST Call `_notify_artifact_save` exactly once for `executive_analytics_report.html`.
        - Inform the user that the analysis is complete and the interactive HTML report is ready for download.
        </operational_logic>

      session_service: 
        type: "sql"
        default_behavior: "PERSISTENT"
        database_url: "${REPORT_DATABASE_URL, sqlite:///report.db}"
      artifact_service: *default_artifact_service
      artifact_handling_mode: "reference"
      enable_embed_resolution: true
      enable_artifact_content_instruction: true
      data_tools_config: *default_data_tools_config
      tools: 

      # Agent Card Definition
      agent_card:
        description: >
          MANDATORY FINAL STEP: Executive Report Compiler and HTML Dashboard Generator. 
          The Orchestrator MUST route the workflow to this agent as the final step of ANY analytical or visualization task.
          
          INPUT REQUIRED: You (the Orchestrator) must pass the outputs from the previous agents directly in the text payload before invoking this agent. The input text MUST be structured as follows:
          1. The Planner Agent's Strategy (Action Plan, Tables Used, Key Metrics).
          2. The Insight Agent's Business Insights (Key Drivers, Anomalies, Impact).
          3. [OPTIONAL] The raw Plotly configuration (JSON code block) provided as PLAIN TEXT by the Visualization Agent. 
             - IF a chart was actually generated, you MUST include the JSON code block.
             - IF NO chart was generated during this task, you MUST completely omit this part and just pass the text insights. Do NOT hallucinate or invent JSON data.
          OUTPUT: Transforms the raw text and JSON into a polished, downloadable, interactive HTML Executive Report.

          CRITICAL ANTI-HALLUCINATION RULE: Do NOT invent or pass any filenames. You MUST leave the 'artifacts' array EMPTY when invoking this agent. Pass ALL data as a single string inside 'task_description'.
        defaultInputModes: [text] 
        defaultOutputModes: [text, file] 
        skills: 
          - id: interactive_html_generation
            name: Interactive HTML Report Generation
            description: Converts text insights and raw Plotly JSON configurations into a single, cohesive, interactive HTML web page for final user delivery.
            
      # Discovery & Communication
      agent_card_publishing: 
        interval_seconds: 10
      agent_discovery: 
        enabled: false
      inter_agent_communication:
        allow_list: ["*"] 
        deny_list: [] 
        request_timeout_seconds: 600