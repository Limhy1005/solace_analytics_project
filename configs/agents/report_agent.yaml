# Solace Agent Mesh Agent Configuration

log:
  stdout_log_level: INFO
  log_file_level: DEBUG
  log_file: a2a_agent.log

!include ../shared_config.yaml

apps:
  - name: "Report__app"
    app_base_path: .
    app_module: solace_agent_mesh.agent.sac.app
    broker:
      <<: *broker_connection

    app_config:
      namespace: "${NAMESPACE}"
      supports_streaming: true
      agent_name: "Report"
      display_name: "Report Agent"
      model: *planning_model 

      instruction: |
        <system_identity>
        **ROLE:** Executive Report Compiler & Publisher.
        **MISSION:** Combine the deep analysis text from the Insight Agent and the chart artifacts from the Visualization Agent into a single, polished, and executive-friendly HTML report.
        </system_identity>

        <operational_protocol>
        You are the Final Compiler in the data pipeline. You will receive:
        1. The Original User Query.
        2. Business Insights (Text) generated by the Insight Agent.
        3. A Chart Artifact (e.g., plotly_chart.html) generated by the Visualization Agent.

        **CRITICAL RULES:**
        1. **Do Not Analyze Data:** Rely entirely on the Insight Agent's text. Do not re-analyze raw data yourself.
        2. **Report Structure:** Create an HTML document with a clean layout. Include an "Executive Summary" section (using the Insight text) and a "Visualizations" section.
        3. **Embed the Chart:** Embed the Visualization Agent's chart artifact into your final HTML report. (You can use an iframe to reference the chart artifact filename).
        4. **Save Artifact:** You MUST output the final report using the save_artifact syntax:

           «««save_artifact: filename="final_executive_report.html" mime_type="text/html"
           <!DOCTYPE html>
           <html>
           <head><title>Executive Report</title><style>body{font-family: Arial, sans-serif; margin: 20px;} iframe{width: 100%; height: 500px; border: none;}</style></head>
           <body>
           <h1>Data Report</h1>
           <div class="summary">[Insert Insight Agent's Text Here, formatted nicely]</div>
           <div class="chart"><iframe src="plotly_chart.html"></iframe></div>
           </body>
           </html>
           »»»
           
        5. **Completion:** When done, politely inform the user that their final executive report is ready for download/viewing.
        </operational_protocol>

      session_service: 
        type: "sql"
        default_behavior: "PERSISTENT"
        database_url: "${REPORT_DATABASE_URL, sqlite:///report.db}"
      artifact_service: *default_artifact_service
      artifact_handling_mode: "embed"
      enable_embed_resolution: true
      enable_artifact_content_instruction: true
      data_tools_config: *default_data_tools_config
      tools: 
        - group_name: artifact_management
          tool_type: builtin-group

      # Agent Card Definition
      agent_card:
        description: |
          The Final Report Compiler. 
          INPUT REQUIRED: Business insights (text) AND Visualizations (HTML charts). 
          OUTPUT: A polished, combined HTML executive report. 
          WARNING: Do NOT invoke this agent until you have already gathered both text insights and visualizations from other agents.
        defaultInputModes: [text] 
        defaultOutputModes: [text, file] 
        skills: 
          - id: report_compilation
            name: Report Compilation
            description: Synthesizes text insights and HTML visualizations into a final, user-facing executive report.
            
      # Discovery & Communication
      agent_card_publishing: 
        interval_seconds: 10
      agent_discovery: 
        enabled: true
      inter_agent_communication:
        allow_list: ["*"] 
        deny_list: [] 
        request_timeout_seconds: 600
