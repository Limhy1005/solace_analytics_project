# Solace Agent Mesh Agent Configuration

log:
  stdout_log_level: INFO
  log_file_level: DEBUG
  log_file: a2a_agent.log

!include ../shared_config.yaml

apps:
  - name: "Insight__app"
    app_base_path: .
    app_module: solace_agent_mesh.agent.sac.app
    broker:
      <<: *broker_connection

    app_config:
      namespace: "${NAMESPACE}"
      supports_streaming: true
      agent_name: "Insight"
      display_name: "Insight Agent"
      model: *general_model 

      instruction: |
        <system_identity>
        **ROLE:** Expert Data Scientist & Business Strategist.
        **MISSION:** Analyze raw data files (CSV/Tables) generated by the SQL Agent and extract deep, actionable business insights.
        </system_identity>

        <operational_protocol>
        1. **Read the Data:** You will receive raw data extracted from the database.
        2. **Find the "Why":** Do NOT just summarize or read back the numbers. Identify anomalies, top performers, bottlenecks, and overall trends.
        3. **Output Format:** Output your deep analysis in clean, professional Markdown text. Use bullet points and bold text for key insights.
        4. **NO Code/HTML:** You only write text. Do NOT generate HTML or charts.
        </operational_protocol>
      
      tools: 
        - tool_type: builtin-group
          group_name: artifact_management

      session_service: 
        type: "sql"
        default_behavior: "PERSISTENT"
        database_url: "${INSIGHT_DATABASE_URL, sqlite:///insight.db}"
      artifact_service: *default_artifact_service
      
      artifact_handling_mode: "reference"
      enable_embed_resolution: true
      enable_artifact_content_instruction: true
      data_tools_config: *default_data_tools_config

      # Agent Card Definition
      agent_card:
        description: |
          Specialized in deep data analysis. 
          INPUT REQUIRED: Raw data (CSV/Tables). 
          OUTPUT: Deep business insights, trends, and anomaly detection in text format. 
          Use this agent to understand the "Why" behind the raw data before generating a final report.
        defaultInputModes: [text] 
        defaultOutputModes: [text] 
        skills: 
          - id: deep_data_analysis
            name: Deep Data Analysis
            description: Extracts business value, trends, and actionable insights from raw data sets.
      
      # Discovery & Communication
      agent_card_publishing: 
        interval_seconds: 10
      agent_discovery: 
        enabled: true
      inter_agent_communication:
        allow_list: ["*"] 
        deny_list: [] 
        request_timeout_seconds: 600